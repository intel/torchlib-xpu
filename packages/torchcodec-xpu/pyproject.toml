[build-system]
requires = [
    "pybind11",
    "scikit-build-core>=0.10",
    "torch~=2.10.0",  # WA: must be specified in root project with build-constraint-dependencies
    "torchcodec~=0.10.0"
]
build-backend = "scikit_build_core.build"

[project]
name = "torchcodec-xpu"
description = "Intel extension for torchcodec"
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
authors = [
    { name = "Dmitry Rogozhkin", email = "dmitry.v.rogozhkin@intel.com" },
]
dynamic = ["version"]
dependencies = [
    "torchcodec~=0.10.0"
]

[project.urls]
GitHub = "https://github.com/intel/torchlib-xpu"

[project.optional-dependencies]
test = [
    "numpy",
    "pytest",
    "torcheval",
]

[tool.scikit-build]
cmake.minimum-version = "3.18"

[tool.scikit-build.metadata.version]
provider = "scikit_build_core.metadata.regex"
input = "version.txt"
regex = "^v?(?P<value>[0-9a-zA-Z.+-_]+)"
